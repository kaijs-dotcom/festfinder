<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mein FestFinder</title>
    <style>
        :root {
            --primary: #e65100;
            --bg-app: #f7f9fc;
            --bg-card: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --border: #edf2f7;
            --accent-green: #27ae60;
            --accent-blue: #2980b9;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: var(--bg-app); color: var(--text-main); padding: 16px; padding-bottom: 80px; }
        header { background: linear-gradient(135deg, #b21f00, var(--primary)); color: white; padding: 20px 16px; border-radius: 16px; text-align: center; margin-bottom: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 22px; font-weight: 800; }
        .agent-notification { background-color: #e3f2fd; border: 1px solid #90caf9; border-radius: 12px; padding: 14px; margin-bottom: 16px; display: none; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-action { display: block; width: 100%; padding: 12px; background: var(--accent-blue); color: white; text-align: center; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 8px; }
        .section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 12px; font-weight: 700; }
        .fest-card { background-color: var(--bg-card); border-radius: 16px; padding: 14px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.03); border: 1px solid var(--border); position: relative; }
        .tag-badge { position: absolute; top: 14px; right: 14px; background: #fff3e0; padding: 2px 6px; border-radius: 6px; font-size: 12px; }
        .fest-name { font-size: 16px; font-weight: 700; color: #1a202c; margin-bottom: 4px; }
        .fest-org { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
        .fest-meta { display: flex; justify-content: space-between; border-top: 1px dashed var(--border); padding-top: 10px; font-size: 12px; font-weight: 600; }
        .fest-distance { color: var(--accent-green); }
    </style>
</head>
<body>

    <header>
        <h1>⛺ Mein FestFinder v7.2</h1>
        <p style="font-size: 12px; opacity: 0.9; margin-top: 4px;">Region Nürtingen & Umgebung</p>
    </header>

    <div class="agent-notification" id="agentBox">
        <strong style="font-size:14px; color:#1565c0;">🤖 Agenten-Fundstück in der Zwischenablage!</strong>
        <p style="font-size:12px; margin: 4px 0; color: #424242;" id="agentText">Ein neues Fest wurde im Hintergrund analysiert.</p>
        <button class="btn-action" onclick="importFromClipboard()">Fest in Liste speichern ✨</button>
    </div>

    <div class="section-title">Feste im Umkreis</div>
    <div id="festListContainer"></div>

    <script>
        const defaultFeste = [
            { id: 1, name: "Feuerwehrfest Nürtingen", org: "FF Nürtingen", date: "26.06.2026", dist: 1.2, offers: "Essen & Bar" },
            { id: 2, name: "Traditionelle Sommerhocketse", org: "MV Geislingen", date: "27.06.2026", dist: 8.5, offers: "Essen & Bar" }
        ];

        let feste = JSON.parse(localStorage.getItem('ff_feste_v7')) || defaultFeste;

        function renderFeste() {
            const container = document.getElementById('festListContainer');
            container.innerHTML = '';
            
            if(feste.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#7f8c8d; padding:20px;">Keine Feste eingetragen.</p>';
                return;
            }

            feste.forEach(f => {
                const card = document.createElement('div');
                card.className = 'fest-card';
                card.innerHTML = `
                    <div class="tag-badge">🍖</div>
                    <div class="fest-name">${f.name}</div>
                    <div class="fest-org">Veranstalter: ${f.org}</div>
                    <div class="fest-meta">
                        <div>📅 ${f.date}</div>
                        <div class="fest-distance">📍 ${f.dist} km</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function checkClipboard() {
            if (!navigator.clipboard || !navigator.clipboard.readText) return;
            
            navigator.clipboard.readText().then(text => {
                if (text.trim().startsWith('{') && text.includes('"name":')) {
                    try {
                        const parsed = JSON.parse(text);
                        if (!feste.some(f => f.name === parsed.name)) {
                            document.getElementById('agentText').innerText = `Neues Fest erkannt: "${parsed.name}"`;
                            document.getElementById('agentBox').style.display = 'block';
                        }
                    } catch(e) {}
                }
            }).catch(() => {});
        }

        function importFromClipboard() {
            navigator.clipboard.readText().then(text => {
                const neues = JSON.parse(text);
                
                // Datum von YYYY-MM-DD in DD.MM.YYYY umwandeln falls nötig
                let formattedDate = neues.date;
                if(formattedDate.includes('-')) {
                    formattedDate = formattedDate.split('-').reverse().join('.');
                }

                feste.unshift({
                    id: Date.now(),
                    name: neues.name,
                    org: neues.org,
                    date: formattedDate,
                    dist: neues.dist,
                    offers: "Essen"
                });
                
                localStorage.setItem('ff_feste_v7', JSON.stringify(feste));
                document.getElementById('agentBox').style.display = 'none';
                renderFeste();
            });
        }

        window.onload = () => {
            renderFeste();
            localStorage.setItem('ff_feste_v7', JSON.stringify(feste));
            setTimeout(checkClipboard, 1000);
        };
        window.onfocus = () => { checkClipboard(); };
    </script>
</body>
</html>
