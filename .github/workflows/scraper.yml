name: Deep-Event-Crawler

on:
  workflow_dispatch:

jobs:
  deep_crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Event-Daten extrahieren
        run: |
          pip install beautifulsoup4 requests lxml
          python - << 'EOF'
          import requests
          from bs4 import BeautifulSoup
          
          # Die URL aus dem Log
          target_url = "https://www.schwarzwald-tourismus.info/schwarzwald/dorfurlaub/herrischried-und-rickenbach/veranstaltungen"
          response = requests.get(target_url, headers={"User-Agent": "FestFinder-Bot/2.0"})
          
          soup = BeautifulSoup(response.content, 'lxml')
          
          # Hier suchen wir nach den Event-Containern (typischerweise in <h3> oder <div>)
          # Da jede Seite anders ist, nutzen wir hier einen allgemeinen Ansatz
          events = soup.find_all(['h2', 'h3', 'div'], class_=['event', 'title', 'teaser'])
          
          print(f"Gefundene Elemente auf der Seite: {len(events)}")
          for i, e in enumerate(events[:5]):
              print(f"Event {i+1}: {e.get_text(strip=True)}")
          EOF
