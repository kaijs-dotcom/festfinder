name: Profi Fest-Scraper (API-Lauscher)

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
      - name: Setup & Scrape
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Installieren
        run: |
          pip install requests playwright
          playwright install chromium

      - name: API-Lauscher starten
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import json
          import requests
          from playwright.sync_api import sync_playwright

          URL = os.environ.get("SUPABASE_URL")
          KEY = os.environ.get("SUPABASE_KEY")
          headers = {"apikey": KEY, "Authorization": f"Bearer {KEY}", "Content-Type": "application/json"}

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              
              # Wir überwachen die Netzwerkanfragen
              def handle_response(response):
                  if "events" in response.url and "json" in response.headers.get("content-type", ""):
                      try:
                          data = response.json()
                          # Wenn wir hier JSON finden, extrahieren wir es
                          print("API-Daten gefunden!")
                      except: pass
              
              page.on("response", handle_response)
              page.goto("https://remstal.de/events/kalender", wait_until="networkidle")
              
              # Jetzt klicken wir auf 'Liste'
              try:
                  page.get_by_text("Liste").first.click()
                  page.wait_for_timeout(5000)
              except: pass
              
              browser.close()
          EOF
