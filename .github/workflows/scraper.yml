name: Profi Fest-Scraper (Brechstange)

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
      - name: Installieren
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium

      - name: Brechstange ausführen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import requests
          from playwright.sync_api import sync_playwright

          URL = os.environ.get("SUPABASE_URL")
          KEY = os.environ.get("SUPABASE_KEY")
          headers = {"apikey": KEY, "Authorization": f"Bearer {KEY}", "Content-Type": "application/json"}

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.goto("https://remstal.de/events/kalender", wait_until="networkidle", timeout=60000)
              page.wait_for_timeout(10000) # Lange warten auf das dynamische Laden
              
              # Wir nehmen ALLES, was Text ist, und schauen es uns an
              # Wir suchen nicht mehr nach Klassen, sondern nach der Seite als Ganzes
              content = page.evaluate("document.body.innerText")
              
              # Einfacher Filter: Zeilen, die ein Datum oder Veranstaltungs-Charakter haben
              lines = content.split('\n')
              count = 0
              for line in lines:
                  line = line.strip()
                  # Wenn die Zeile kurz genug ist für einen Titel, aber lang genug für ein Event
                  if 10 < len(line) < 60 and any(c.isdigit() for c in line):
                      requests.post(f"{URL}/rest/v1/feste", headers=headers, json={
                          "name": line,
                          "veranstalter": "Remstal Tourismus",
                          "datum": "Gefunden",
                          "link": "https://remstal.de/events/kalender"
                      })
                      count += 1
              print(f"-> {count} Zeilen als potentielle Events gespeichert.")
              browser.close()
          EOF
