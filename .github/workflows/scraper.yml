name: Event-Archiv-Crawler (Langsam)

on:
  schedule:
    # Läuft einmal am Tag um 04:00 Uhr morgens (da schläft Cloudflare fast)
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Archiv-Crawler starten
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - << 'EOF'
          import requests, os, time, random
          from urllib3.exceptions import InsecureRequestWarning
          requests.packages.urllib3.disable_warnings(category=InsecureRequestWarning)

          URL, KEY = os.environ.get("SUPABASE_URL"), os.environ.get("SUPABASE_KEY")
          headers = {
              "apikey": KEY, 
              "Authorization": f"Bearer {KEY}", 
              "Content-Type": "application/json",
              # Ein sehr "echter" User-Agent
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36"
          }
          
          # Die Ziel-URL
          API_URL = "https://wein.toubiz.de/api/v1/eventDates?filter[clientIncludingManaged]=events&language=de"

          # Der Trick: Zufällige Wartezeit, um nicht wie ein Skript zu wirken
          time.sleep(random.uniform(5, 15)) 
          
          try:
              response = requests.get(API_URL, headers=headers, verify=False, timeout=30)
              if response.status_code == 200:
                  data = response.json().get("data", [])
                  print(f"Crawler hat {len(data)} Events gefunden.")
                  
                  # Hier löschen wir evtl. alte Daten, bevor wir die neuen schreiben
                  requests.delete(f"{URL}/rest/v1/feste", headers=headers, params={"id": "gt.0"})
                  
                  for item in data:
                      attr = item.get("attributes", {})
                      requests.post(f"{URL}/rest/v1/feste", headers=headers, json={
                          "name": attr.get("name"),
                          "datum": attr.get("startDate")
                      })
                  print("Archiv erfolgreich aktualisiert.")
              else:
                  print(f"Cloudflare hat uns erwischt. Status: {response.status_code}")
          except Exception as e:
              print(f"Fehler: {e}")
          EOF
