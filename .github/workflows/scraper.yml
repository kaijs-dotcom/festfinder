name: Event-Import-Workflow

on:
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Daten aus Toubiz-API importieren
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - << 'EOF'
          import requests
          import os
          import urllib3
          
          # SSL-Warnungen unterdrücken
          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)
          
          URL = os.environ.get("SUPABASE_URL")
          KEY = os.environ.get("SUPABASE_KEY")
          headers = {"apikey": KEY, "Authorization": f"Bearer {KEY}", "Content-Type": "application/json"}
          
          API_URL = "https://wein.toubiz.de/api/v1/eventDates?filter[clientIncludingManaged]=events&language=de"
          
          # verify=False ist hier der entscheidende Punkt gegen den SSL-Fehler
          response = requests.get(API_URL, headers={"User-Agent": "FestFinder-App/1.0"}, verify=False)
          
          if response.status_code == 200:
              data = response.json()
              items = data.get("data", [])
              print(f"Erfolgreich {len(items)} Events gefunden.")
              
              for item in items:
                  attr = item.get("attributes", {})
                  requests.post(f"{URL}/rest/v1/feste", headers=headers, json={
                      "name": attr.get("name"),
                      "datum": attr.get("startDate")
                  })
              print("Import abgeschlossen.")
          else:
              print(f"API Fehler: {response.status_code} - Text: {response.text}")
          EOF
