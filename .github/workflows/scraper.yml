name: Profi Fest-Scraper (Diagnose 2.0)

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: API-Diagnose mit SSL-Fix
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - << 'EOF'
          import requests
          import urllib3
          
          # Sicherheitswarnungen für die Diagnose unterdrücken
          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)
          
          API_URL = "https://wein.toubiz.de/api/v1/eventDates?filter%5BclientIncludingManaged%5D=events&filter%5Bdate%5D%5Bafter%5D=today&filter%5Bdate%5D%5Bbefore%5D=next-15&language=de"
          
          try:
              # verify=False umgeht den Zertifikatsfehler
              response = requests.get(API_URL, verify=False)
              data = response.json()
              
              print(f"DEBUG: Status Code: {response.status_code}")
              print(f"DEBUG: Keys im JSON: {data.keys() if isinstance(data, dict) else 'Nicht dict'}")
              
              items = data.get("data", [])
              print(f"DEBUG: Anzahl gefundener Events: {len(items)}")
              
              if len(items) > 0:
                  print(f"DEBUG: Erstes Event-Beispiel: {items[0]}")
                  
          except Exception as e:
              print(f"DEBUG: Fehler beim API-Abruf: {e}")
          EOF
