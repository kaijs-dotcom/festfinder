name: Profi Fest-Scraper (Passiver Lauscher)

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
      - name: Setup & Scrape
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Installieren
        run: |
          pip install requests playwright
          playwright install chromium

      - name: Passiver Lauscher
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import requests
          from playwright.sync_api import sync_playwright

          URL = os.environ.get("SUPABASE_URL")
          KEY = os.environ.get("SUPABASE_KEY")
          headers = {"apikey": KEY, "Authorization": f"Bearer {KEY}", "Content-Type": "application/json"}

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              
              # Hier sammeln wir Daten, sobald sie das Netzwerk passieren
              def handle_response(response):
                  if "events" in response.url and "json" in response.headers.get("content-type", ""):
                      try:
                          data = response.json()
                          # Versuchen wir, das JSON-Paket direkt zu zerlegen
                          # Wenn es eine Liste ist, nehmen wir sie direkt
                          items = data if isinstance(data, list) else data.get("items", [])
                          for item in items:
                              name = item.get("title", "Event")
                              datum = item.get("start_date", "Datum n.n.")
                              link = "https://remstal.de" + item.get("url", "")
                              requests.post(f"{URL}/rest/v1/feste", headers=headers, json={"name": name, "datum": datum, "link": link})
                      except: pass
              
              page.on("response", handle_response)
              # Wir laden einfach die Seite und warten, das Skript der Seite erledigt den Rest
              page.goto("https://remstal.de/events/kalender", wait_until="networkidle")
              page.wait_for_timeout(10000) # 10 Sekunden Zeit für den Hintergrund-Prozess
              browser.close()
          EOF
