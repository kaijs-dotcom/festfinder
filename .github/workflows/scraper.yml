name: Finaler-Event-Import

on:
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Daten in Supabase schreiben
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          pip install beautifulsoup4 requests lxml
          python - << 'EOF'
          import requests, os
          from bs4 import BeautifulSoup
          
          URL, KEY = os.environ.get("SUPABASE_URL"), os.environ.get("SUPABASE_KEY")
          headers = {"apikey": KEY, "Authorization": f"Bearer {KEY}", "Content-Type": "application/json"}
          
          target_url = "https://www.schwarzwald-tourismus.info/schwarzwald/dorfurlaub/herrischried-und-rickenbach/veranstaltungen"
          response = requests.get(target_url, headers={"User-Agent": "FestFinder-Bot/2.0"})
          soup = BeautifulSoup(response.content, 'lxml')
          
          # Wir filtern die Überschriften, die nach Events klingen
          # Wir ignorieren allgemeine Dinge wie "KONTAKT" oder "Navigation"
          ignore = ['KONTAKT', 'FOLLOW US', 'Breadcrumb', 'Veranstaltungen']
          
          for h in soup.find_all(['h2', 'h3']):
              text = h.get_text(strip=True)
              if text and text not in ignore and len(text) > 5:
                  print(f"Importiere: {text}")
                  requests.post(f"{URL}/rest/v1/feste", headers=headers, json={"name": text})
          EOF
