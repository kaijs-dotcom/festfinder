name: Profi Fest-Scraper (Screenshot-Diagnose)

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Setup & Scrape
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Installieren
        run: |
          pip install playwright
          playwright install chromium

      - name: Screenshot machen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import requests
          from playwright.sync_api import sync_playwright

          URL = os.environ.get("SUPABASE_URL")
          KEY = os.environ.get("SUPABASE_KEY")
          headers = {"apikey": KEY, "Authorization": f"Bearer {KEY}"}

          res = requests.get(f"{URL}/rest/v1/quellen?aktiv_status=eq.true", headers=headers)
          q = res.json()[0] # Nimmt die erste aktive Quelle

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.set_viewport_size({"width": 375, "height": 812})
              page.goto(q['url'], wait_until="networkidle", timeout=45000)
              page.wait_for_timeout(3000)
              
              # Cookie-Banner weg
              try:
                  page.locator("button[data-testid='uc-accept-all-button']").click()
                  page.wait_for_timeout(2000)
              except: pass
              
              page.screenshot(path="debug_ansicht.png")
              browser.close()
          EOF

      - name: Screenshot hochladen
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: debug_ansicht.png
