name: Profi Fest-Scraper (Rohe-Gewalt-Modus)

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
      - name: Setup & Scrape
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Installieren
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium

      - name: Rohe Gewalt ausführen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import requests
          from playwright.sync_api import sync_playwright
          from bs4 import BeautifulSoup

          URL = os.environ.get("SUPABASE_URL")
          KEY = os.environ.get("SUPABASE_KEY")
          headers = {"apikey": KEY, "Authorization": f"Bearer {KEY}", "Content-Type": "application/json"}

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.goto("https://remstal.de/events/kalender", wait_until="networkidle")
              page.wait_for_timeout(5000)
              
              # KEINE Selektoren, einfach alles was 'a' ist
              soup = BeautifulSoup(page.content(), 'html.parser')
              all_links = soup.find_all('a')
              
              count = 0
              for a in all_links:
                  link = a.get('href', '')
                  text = a.get_text(" ", strip=True)
                  # Wenn der Link "/events/" enthält, ist es wahrscheinlich ein Event
                  if "/events/" in link and len(text) > 10:
                      full_url = f"https://remstal.de{link}" if link.startswith('/') else link
                      requests.post(f"{URL}/rest/v1/feste", headers=headers, json={
                          "name": text[:50],
                          "veranstalter": "Remstal Tourismus",
                          "datum": "Gefunden",
                          "link": full_url
                      })
                      count += 1
              print(f"-> {count} Links als Events gespeichert.")
              browser.close()
          EOF
