name: Universeller Fest-Scraper (Playwright)

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Abhängigkeiten installieren
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium

      - name: Quellen mit virtuellem Browser analysieren
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import requests
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright
          import re

          # Zugangsdaten laden
          URL = os.environ.get("SUPABASE_URL")
          KEY = os.environ.get("SUPABASE_KEY")
          headers = {
              "apikey": KEY,
              "Authorization": f"Bearer {KEY}",
              "Content-Type": "application/json",
              "Prefer": "return=minimal"
          }

          # 1. Aktive Quellen auslesen
          try:
              res = requests.get(f"{URL}/rest/v1/quellen?aktiv_status=eq.true", headers=headers)
              quellen = res.json()
          except Exception as e:
              print("Fehler beim Laden der Quellen:", e)
              quellen = []

          # 2. Virtuellen Browser starten
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()

              for q in quellen:
                  print(f"Scrape Quelle: {q['beschreibung']} ({q['url']})")
                  try:
                      # Webseite aufrufen und warten, bis das Netzwerk zur Ruhe kommt (für dynamische Inhalte)
                      page.goto(q['url'], wait_until="networkidle", timeout=30000)
                      
                      # Den vollständig gerenderten HTML-Inhalt holen
                      html_content = page.content()
                      soup = BeautifulSoup(html_content, 'html.parser')
                      
                      # Text der Seite für eine erste Analyse holen
                      page_text = soup.get_text()
                      
                      # Ein etwas schlauerer Extraktions-Versuch für Events:
                      # Wir suchen nach typischen Mustern (z.B. Zeilen, die ein Datum enthalten)
                      lines = [line.strip() for line in page_text.split('\n') if line.strip()]
                      
                      found_events = []
                      
                      # Einfacher Regex für deutsche Datumsformate (z.B. 22.06.2026 oder 22. Juni)
                      date_pattern = re.compile(r'(\d{1,2}\.\d{1,2}\.|\d{1,2}\.\s?(?:Jan|Feb|Mär|Apr|Mai|Jun|Jul|Aug|Sep|Okt|Nov|Dez))')

                      for i, line in enumerate(lines):
                          if date_pattern.search(line):
                              # Wenn wir ein Datum finden, nehmen wir an, dass der Kontext (vorherige/nächste Zeile) das Event beschreibt
                              context_lines = lines[max(0, i-1):min(len(lines), i+3)]
                              event_candidate = " | ".join(context_lines)
                              
                              # Ein paar Filter, um Müll zu vermeiden
                              if any(keyword in event_candidate.lower() for keyword in ["fest", "hocketse", "markt", "feier", "festival", "hocketes", "hock"]):
                                  if len(event_candidate) < 200: # Schutz vor Riesen-Textblöcken
                                      found_events.append({
                                          "raw": event_candidate,
                                          "date": line
                                      })

                      # Wenn der schlaue Filter nichts findet, aber die Seite generell relevant klingt (Fallbacks für Vereine)
                      if not found_events and any(x in page_text.lower() for x in ["fest", "hocketse", "termine"]):
                          found_events.append({
                              "raw": f"Veranstaltung / Fest bei {q['beschreibung']}",
                              "date": "Siehe Webseite"
                          })

                      # Duplikate filtern und in Datenbank speichern
                      saved_count = 0
                      for ev in found_events[:10]: # Maximal 10 Events pro Quelle für den Anfang
                          neues_fest = {
                              "name": ev["raw"][:80], # Auf 80 Zeichen kürzen für die Optik
                              "veranstalter": q['beschreibung'],
                              "datum": ev["date"][:30],
                              "entfernung": "Region",
                              "link": q['url']
                          }
                          
                          # Prüfen, ob exakt dieses Fest schon existiert
                          check = requests.get(f"{URL}/rest/v1/feste?name=eq.{neues_fest['name']}", headers=headers)
                          if len(check.json()) == 0:
                              requests.post(f"{URL}/rest/v1/feste", headers=headers, json=neues_fest)
                              saved_count += 1
                      
                      print(f"-> {saved_count} neue(s) Fest(e) aus dieser Quelle extrahiert.")

                  except Exception as e:
                      print(f"Fehler bei Quelle {q['url']}: {e}")
                      
              browser.close()
          EOF
