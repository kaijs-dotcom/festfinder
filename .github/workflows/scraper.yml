name: Profi Fest-Scraper (Sitemap-Test)

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Sitemap-Extraktion
        run: |
          python - << 'EOF'
          import requests
          import xml.etree.ElementTree as ET

          # Wir laden die Haupt-Sitemap
          sitemap_url = "https://remstal.de/sitemap.xml" 
          try:
              response = requests.get(sitemap_url, headers={"User-Agent": "Mozilla/5.0"})
              root = ET.fromstring(response.content)
              
              # Der Namespace für Sitemaps
              ns = {'ns': 'http://www.sitemaps.org/schemas/sitemap/0.9'}
              
              count = 0
              for loc in root.findall('.//ns:loc', ns):
                  url = loc.text
                  # Wir filtern nur die Event-Links
                  if "/events/" in url:
                      print(f"Gefundener Event-Link: {url}")
                      count += 1
              
              print(f"DEBUG: Insgesamt {count} Event-Links in der Sitemap gefunden.")
          except Exception as e:
              print(f"DEBUG: Fehler beim Sitemap-Zugriff: {e}")
          EOF
