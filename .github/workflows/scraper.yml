import os
import requests
import re
from bs4 import BeautifulSoup

def run_crawler():
    # 1. Konfiguration aus Umgebungsvariablen
    supabase_url = os.environ.get("SUPABASE_URL")
    supabase_key = os.environ.get("SUPABASE_KEY")
    target_url = "https://www.schwarzwald-tourismus.info/schwarzwald/dorfurlaub/herrischried-und-rickenbach/veranstaltungen"

    headers = {
        "apikey": supabase_key,
        "Authorization": f"Bearer {supabase_key}",
        "Content-Type": "application/json",
        "Prefer": "resolution=merge-duplicates" 
    }

    # 2. Seite laden
    response = requests.get(target_url, headers={"User-Agent": "Mozilla/5.0"})
    
    if response.status_code != 200:
        print(f"Seite nicht erreichbar: {response.status_code}")
        return

    soup = BeautifulSoup(response.content, 'lxml')
    events = soup.find_all('div', class_='c-headline__icon-wrapper')
    
    if not events:
        print("Keine Events gefunden.")
        return

    print(f"Gefundene Elemente: {len(events)}")

    # 3. Daten verarbeiten und senden
    for e in events:
        h3_tag = e.find('h3')
        if not h3_tag:
            continue
            
        raw_name = h3_tag.get_text(strip=True)
        # Duplikat-Filter
        clean_name = re.sub(r'(.+?)\1', r'\1', raw_name)
        
        payload = {
            "name": clean_name,
            "veranstalter": "Schwarzwald Tourismus"
        }

        # 4. Upsert (Supabase aktualisiert automatisch, wenn name existiert)
        resp = requests.post(f"{supabase_url}/rest/v1/feste", headers=headers, json=payload)

        if resp.status_code in [200, 201]:
            print(f"Erfolg: {clean_name}")
        else:
            print(f"Fehler bei {clean_name}: {resp.status_code} - {resp.text}")

if __name__ == "__main__":
    run_crawler()
