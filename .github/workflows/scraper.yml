name: Finaler-Event-Import-V2

on:
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Daten reinigen und importieren
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          pip install beautifulsoup4 requests lxml
          python - << 'EOF'
          import requests, os
          from bs4 import BeautifulSoup
          
          URL, KEY = os.environ.get("SUPABASE_URL"), os.environ.get("SUPABASE_KEY")
          headers = {"apikey": KEY, "Authorization": f"Bearer {KEY}", "Content-Type": "application/json"}
          
          target_url = "https://www.schwarzwald-tourismus.info/schwarzwald/dorfurlaub/herrischried-und-rickenbach/veranstaltungen"
          response = requests.get(target_url, headers={"User-Agent": "FestFinder-Bot/2.0"})
          soup = BeautifulSoup(response.content, 'lxml')
          
          # Die Blacklist für Müll-Daten
          blacklist = ['KONTAKT', 'FOLLOW US', 'Breadcrumb', 'Veranstaltungen', 'Unsere Tipps', 'Navigation']
          
          # Wir suchen nach den Blöcken, die Events enthalten
          # Hinweis: Wir probieren verschiedene Klassen, die typisch für diese Seite sind
          events = soup.find_all('div', class_=['teaser', 'event-item', 'item'])
          
          for e in events:
              title_tag = e.find(['h2', 'h3'])
              link_tag = e.find('a', href=True)
              date_tag = e.find(class_=['date', 'event-date', 'time'])
              
              if title_tag:
                  name = title_tag.get_text(strip=True)
                  if not any(b in name for b in blacklist):
                      link = "https://www.schwarzwald-tourismus.info" + link_tag['href'] if link_tag else ""
                      datum = date_tag.get_text(strip=True) if date_tag else "Datum prüfen"
                      
                      print(f"Importiere: {name} | {datum}")
                      requests.post(f"{URL}/rest/v1/feste", headers=headers, json={
                          "name": name,
                          "datum": datum,
                          "link": link
                      })
          EOF
