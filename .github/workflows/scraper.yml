name: Profi Fest-Scraper (Click-to-Load)

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
      - name: Setup & Scrape
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Installieren
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium

      - name: Click-to-Load ausführen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import requests
          from playwright.sync_api import sync_playwright
          from bs4 import BeautifulSoup

          URL = os.environ.get("SUPABASE_URL")
          KEY = os.environ.get("SUPABASE_KEY")
          headers = {"apikey": KEY, "Authorization": f"Bearer {KEY}", "Content-Type": "application/json"}

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.goto("https://remstal.de/events/kalender", wait_until="networkidle", timeout=60000)
              
              # 1. Cookie-Banner weg
              try: page.locator("button[data-testid='uc-accept-all-button']").click()
              except: pass

              # 2. Den Button "Liste | 1 – 12 von 1064 Ergebnissen" suchen und KLICKEN
              try:
                  page.get_by_text("Liste").first.click()
                  page.wait_for_timeout(5000) # Zeit zum Laden der echten Liste
              except Exception as e:
                  print(f"Konnte Liste nicht anklicken: {e}")

              # 3. Jetzt erst den Inhalt auslesen
              soup = BeautifulSoup(page.content(), 'html.parser')
              
              # Wir suchen jetzt nach den Event-Karten. Meistens Container in einer Liste.
              # Wir filtern nach 'a' Tags, die '/events/' enthalten und einen Text haben
              all_links = soup.select('a[href*="/events/"]')
              
              count = 0
              for a in all_links:
                  text = a.get_text(" ", strip=True).lower()
                  # Filter: Kein Navigations-Müll mehr
                  if len(text) > 15 and "navigation" not in text and "inhalt" not in text:
                      full_url = f"https://remstal.de{a['href']}" if a['href'].startswith('/') else a['href']
                      requests.post(f"{URL}/rest/v1/feste", headers=headers, json={
                          "name": text[:50],
                          "veranstalter": "Remstal Tourismus",
                          "datum": "Gefunden",
                          "link": full_url
                      })
                      count += 1
              print(f"-> {count} echte Events geladen.")
              browser.close()
          EOF
