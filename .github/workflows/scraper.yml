name: Profi Fest-Scraper (Deep-Crawler)

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Installieren
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium

      - name: Deep-Crawler ausführen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import requests
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright

          URL = os.environ.get("SUPABASE_URL")
          KEY = os.environ.get("SUPABASE_KEY")
          headers = {"apikey": KEY, "Authorization": f"Bearer {KEY}", "Content-Type": "application/json", "Prefer": "return=minimal"}

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.goto("https://remstal.de/events/kalender", wait_until="networkidle", timeout=60000)
              
              soup = BeautifulSoup(page.content(), 'html.parser')
              # Sammle nur sinnvolle Links ein
              links = [a['href'] for a in soup.select('a[href*="/events/"]') if a.get('href')]
              
              # Vermeide Duplikate und gehe nur auf Unterseiten
              unique_links = list(set([l for l in links if l.count('/') > 2]))

              for link in unique_links[:5]:
                  full_url = f"https://remstal.de{link}" if link.startswith('/') else link
                  try:
                      page.goto(full_url, wait_until="domcontentloaded", timeout=30000)
                      sub_soup = BeautifulSoup(page.content(), 'html.parser')
                      
                      # Suche nach Event-Containern (allgemein gehalten)
                      events = sub_soup.select('article, .event, .entry')
                      
                      for ev in events:
                          title = ev.get_text(" ", strip=True).split('\n')[0][:80]
                          if len(title) > 5:
                              requests.post(f"{URL}/rest/v1/feste", headers=headers, json={
                                  "name": title,
                                  "veranstalter": "Remstal Tourismus",
                                  "datum": "siehe Link",
                                  "link": full_url
                              })
                  except Exception as e:
                      print(f"Fehler bei {full_url}: {e}")
              browser.close()
          EOF
