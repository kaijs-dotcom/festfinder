name: Profi Fest-Scraper (Container-Radar)

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Abhängigkeiten installieren
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium

      - name: Container-Radar ausführen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import requests
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright

          URL = os.environ.get("SUPABASE_URL")
          KEY = os.environ.get("SUPABASE_KEY")
          headers = {"apikey": KEY, "Authorization": f"Bearer {KEY}", "Content-Type": "application/json"}

          keywords = ["dorffest", "ortsfest", "feuerwehr", "musikverein", "festzelt", "musik", "hocketse", "fest", "weindorf", "besen"]

          try:
              res = requests.get(f"{URL}/rest/v1/quellen?aktiv_status=eq.true", headers=headers)
              quellen = res.json()
          except: quellen = []

          for q in quellen:
              print(f"--- Starte Container-Radar für: {q['beschreibung']} ---")
              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(headless=True)
                      page = browser.new_page()
                      page.goto(q['url'], wait_until="networkidle", timeout=60000)
                      page.wait_for_timeout(3000)

                      # Cookie weg
                      try: page.locator("button[data-testid='uc-accept-all-button']").click()
                      except: pass

                      # Wir suchen jetzt spezifisch nach HTML-Elementen, die wie Event-Karten aussehen
                      # Viele Portale nutzen 'article', 'li' oder spezielle 'event'-Klassen
                      events = page.query_selector_all("article, .event, .calendar-item, li")
                      
                      print(f"-> {len(events)} potenzielle Event-Container gefunden.")
                      
                      found_count = 0
                      for ev in events:
                          text = ev.inner_text().lower()
                          # Prüfe, ob Keyword UND Datum enthalten sind
                          if any(k in text for k in keywords) and any(d in text for d in ["2026", ".", "juni", "juli"]):
                              title = ev.inner_text().split('\n')[0]
                              if len(title) > 5 and len(title) < 100:
                                  print(f"-> Treffer: {title}")
                                  # Speichern
                                  requests.post(f"{URL}/rest/v1/feste", headers=headers, json={
                                      "name": title,
                                      "veranstalter": q['beschreibung'],
                                      "datum": "siehe Website",
                                      "link": q['url']
                                  })
                                  found_count += 1
                      
                      browser.close()
                      print(f"-> {found_count} Events gespeichert.")
              except Exception as e:
                  print("Fehler:", e)
          EOF
