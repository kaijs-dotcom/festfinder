name: Profi Fest-Scraper (Diagnose-Radar)

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Abhängigkeiten installieren
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium

      - name: Diagnose-Radar ausführen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import requests
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright

          URL = os.environ.get("SUPABASE_URL")
          KEY = os.environ.get("SUPABASE_KEY")
          headers = {"apikey": KEY, "Authorization": f"Bearer {KEY}"}

          # Schneller Quellen-Check
          try:
              res = requests.get(f"{URL}/rest/v1/quellen?aktiv_status=eq.true", headers=headers)
              quellen = res.json()
          except Exception as e:
              quellen = []

          for q in quellen:
              print(f"=== DIAGNOSE FÜR: {q['beschreibung']} ===")
              print(f"Ziel-URL: {q['url']}")

              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(headless=True)
                      page = browser.new_page()
                      page.set_viewport_size({"width": 1280, "height": 800})
                      page.goto(q['url'], wait_until="networkidle", timeout=45000)
                      page.wait_for_timeout(3000) # Kurze Ruhepause für Scripte
                      
                      html_content = page.content()
                      soup = BeautifulSoup(html_content, 'html.parser')
                      browser.close()

                      print("\n--- HTML-VORSCHAU (Erste 1500 Zeichen) ---")
                      print(html_content[:1500])
                      print("\n----------------------------------------")

                      print(f"\n--- GEFUNDENE LINKS (Insgesamt: {len(soup.find_all('a'))}) ---")
                      links = [a.get('href') for a in soup.find_all('a') if a.get('href')]
                      # Zeige die ersten 30 Links zur Analyse
                      for l in links[:30]:
                          print(f"Link-Gefunden: {l}")
                      print("\n----------------------------------------")

              except Exception as err:
                  print("Kritischer Fehler bei Diagnose:", err)
          EOF
