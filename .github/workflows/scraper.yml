name: Profi Fest-Scraper (Deep Text-Radar)

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Abhängigkeiten installieren
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium

      - name: Deep Text-Radar ausführen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import requests
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright
          import re

          URL = os.environ.get("SUPABASE_URL")
          KEY = os.environ.get("SUPABASE_KEY")
          headers = {
              "apikey": KEY,
              "Authorization": f"Bearer {KEY}",
              "Content-Type": "application/json",
              "Prefer": "return=minimal"
          }

          try:
              res = requests.get(f"{URL}/rest/v1/quellen?aktiv_status=eq.true", headers=headers)
              quellen = res.json()
          except Exception as e:
              print("Fehler beim Laden der Quellen:", e)
              quellen = []

          for q in quellen:
              print(f"--- Starte Deep-Text-Radar für: {q['beschreibung']} ---")
              found_events = []

              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(headless=True)
                      page = browser.new_page()
                      
                      # Wir tun so, als wären wir ein echtes iPhone im Browser, um Sperren zu umgehen
                      page.set_viewport_size({"width": 375, "height": 812})
                      page.goto(q['url'], wait_until="networkidle", timeout=45000)
                      
                      # Wir scrollen die Seite dreimal nach unten, falls Events erst beim Scrollen nachladen
                      for _ in range(3):
                          page.mouse.wheel(0, 1500)
                          page.wait_for_timeout(1000)

                      soup = BeautifulSoup(page.content(), 'html.parser')
                      browser.close()

                      # Wir holen uns den REINEN sichtbaren Text der kompletten Website
                      # Jede Zeile wird einzeln geprüft
                      raw_lines = soup.get_text(separator="\n").split("\n")
                      lines = [l.strip() for l in raw_lines if l.strip()]
                      print(f"   {len(lines)} Textzeilen von der Website geladen. Durchsuche nach Festen...")

                      # Suchbegriffe für echte Feste & Ausschänke
                      keywords = ["fest", "hocketse", "hock", "feuerwehr", "ausschank", "vinothek", "weindorf", "besen", "sommerfest", "weinfest", "kirbe"]

                      for i, line in enumerate(lines):
                          # Wenn in einer Zeile ein Treffer ist
                          if any(k in line.lower() for k in keywords):
                              # Wir ignorieren statische Menütexte
                              if any(x in line.lower() for x in ["impressum", "datenschutz", "cookies", "alle anzeigen", "suche", "filter"]):
                                  continue
                              
                              # Wir bauen einen Kontext aus der Zeile davor und danach (oft Datum + Ort)
                              start_idx = max(0, i - 1)
                              end_idx = min(len(lines), i + 2)
                              context_chunk = lines[start_idx:end_idx]
                              
                              # Erzeuge einen sauberen Event-Namen
                              event_title = line
                              if len(event_title) < 10: # Falls die Zeile zu kurz ist, nimm die nächste dazu
                                  event_title = " | ".join(context_chunk)

                              if 8 < len(event_title) < 95:
                                  if event_title not in [e["title"] for e in found_events]:
                                      # Versuche ein Datum im Umkreis zu finden
                                      date_guess = "Siehe Website"
                                      for chunk in context_chunk:
                                          if re.search(r'\d{1,2}\.\d{1,2}\.', chunk) or any(m in chunk.lower() for m in ["juni", "juli", "august", "september"]):
                                              date_guess = chunk
                                              break

                                      found_events.append({
                                          "title": event_title,
                                          "date": date_guess
                                      })

              except Exception as err:
                  print("Fehler beim Text-Radar:", err)

              # Speichern in Supabase
              saved_count = 0
              for ev in found_events[:25]:
                  name = ev["title"]
                  datum = ev["date"][:30]
                  
                  check = requests.get(f"{URL}/rest/v1/feste?name=eq.{name}", headers=headers)
                  if check.ok and len(check.json()) == 0:
                      requests.post(f"{URL}/rest/v1/feste", headers=headers, json={
                          "name": name,
                          "veranstalter": q['beschreibung'],
                          "datum": datum,
                          "entfernung": "Region",
                          "link": q['url']
                      })
                      saved_count += 1
              
              print(f"-> {len(found_events)} Feste im Text-Radar erkannt. {saved_count} neu gespeichert.")
          EOF
