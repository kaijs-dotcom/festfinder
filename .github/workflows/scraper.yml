name: Sitemap-Crawler-Pilot

on:
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Sitemap-Links extrahieren
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          # Wir installieren jetzt auch lxml für die XML-Verarbeitung
          pip install beautifulsoup4 requests lxml
          python - << 'EOF'
          import requests
          from bs4 import BeautifulSoup
          
          # Wir laden die Sitemap der Schwäbischen Alb
          sitemap_url = "https://www.schwaebischealb.de/sitemap.xml"
          response = requests.get(sitemap_url, headers={"User-Agent": "FestFinder-Crawler/1.0"})
          
          # 'lxml-xml' ist der korrekte Parser für XML-Sitemaps
          soup = BeautifulSoup(response.content, 'lxml-xml')
          urls = [loc.text for loc in soup.find_all('loc') if '/veranstaltungen/' in loc.text]
          
          print(f"Gefundene Event-Seiten: {len(urls)}")
          
          for url in urls[:5]:
              print(f"Besuche: {url}")
          EOF
