name: Profi Fest-Scraper (Geduldiger Jäger)

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
      - name: Setup & Scrape
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Installieren
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium

      - name: Jäger ausführen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import requests
          from playwright.sync_api import sync_playwright
          from bs4 import BeautifulSoup
          import time

          URL = os.environ.get("SUPABASE_URL")
          KEY = os.environ.get("SUPABASE_KEY")
          headers = {"apikey": KEY, "Authorization": f"Bearer {KEY}", "Content-Type": "application/json"}

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.goto("https://remstal.de/events/kalender", wait_until="networkidle")
              
              # Cookie-Banner
              try: page.locator("button[data-testid='uc-accept-all-button']").click()
              except: pass
              
              # Jetzt wird gejagt: Wir scrollen 5x nach unten
              for i in range(5):
                  page.mouse.wheel(0, 1000)
                  time.sleep(2) # Warten, damit der Kalender die nächsten Einträge lädt
              
              soup = BeautifulSoup(page.content(), 'html.parser')
              # Wir suchen jetzt nach den echten Kalender-Karten, die meist 'a' mit 'event' sind
              events = soup.select('a[class*="event"], a[class*="teaser"]')
              
              print(f"Gefundene Kandidaten nach Scrollen: {len(events)}")
              
              for ev in events:
                  title = ev.get_text(" ", strip=True)
                  link = "https://remstal.de" + ev['href'] if ev['href'].startswith('/') else ev['href']
                  
                  if len(title) > 5:
                      requests.post(f"{URL}/rest/v1/feste", headers=headers, json={
                          "name": title,
                          "veranstalter": "Remstal Tourismus",
                          "datum": "Gefunden",
                          "link": link
                      })
              browser.close()
          EOF
