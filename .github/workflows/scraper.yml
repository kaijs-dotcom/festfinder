name: Profi Fest-Scraper (Direct-API)

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: API direkt abfragen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import requests

          URL = os.environ.get("SUPABASE_URL")
          KEY = os.environ.get("SUPABASE_KEY")
          headers = {"apikey": KEY, "Authorization": f"Bearer {KEY}", "Content-Type": "application/json"}
          
          # Die URL, die wir im Log gefunden haben
          API_URL = "https://wein.toubiz.de/api/v1/eventDates?filter%5BclientIncludingManaged%5D=events&filter%5Bdate%5D%5Bafter%5D=today&filter%5Bdate%5D%5Bbefore%5D=next-15&language=de"

          response = requests.get(API_URL)
          data = response.json()

          # Wir iterieren durch die Ergebnisse (Toubiz API-Struktur)
          items = data.get("data", [])
          for item in items:
              # Hier ziehen wir die echten Event-Infos
              attributes = item.get("attributes", {})
              name = attributes.get("name", "Event")
              datum = attributes.get("startDate", "Datum n.n.")
              
              # In Supabase speichern
              requests.post(f"{URL}/rest/v1/feste", headers=headers, json={
                  "name": name,
                  "datum": datum,
                  "link": "https://remstal.de/events/kalender"
              })
          EOF
