name: BW-Event-Master-Importer

on:
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Debug API Antwort
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - << 'EOF'
          import requests
          
          api_url = "https://tourismus-bw.de/api/v1/events?region=baden-wuerttemberg"
          response = requests.get(api_url, headers={"User-Agent": "FestFinder-Backend/2.0"})
          
          print(f"Status Code: {response.status_code}")
          
          # Wir drucken den Anfang der Antwort aus, um das Format zu sehen
          print("Antwort-Inhalt (erste 500 Zeichen):")
          print(response.text[:500])
          
          if response.status_code == 200:
              try:
                  data = response.json()
                  print("JSON erfolgreich geladen!")
              except Exception as e:
                  print(f"Fehler beim Parsen: {e}")
          EOF
