name: Profi Fest-Scraper (Präzise Event-Karten)

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Abhängigkeiten installieren
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium

      - name: Event-Karten präzise auslesen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import requests
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright
          import re

          URL = os.environ.get("SUPABASE_URL")
          KEY = os.environ.get("SUPABASE_KEY")
          headers = {
              "apikey": KEY,
              "Authorization": f"Bearer {KEY}",
              "Content-Type": "application/json",
              "Prefer": "return=minimal"
          }

          try:
              res = requests.get(f"{URL}/rest/v1/quellen?aktiv_status=eq.true", headers=headers)
              quellen = res.json()
          except Exception as e:
              print("Fehler beim Laden der Quellen:", e)
              quellen = []

          for q in quellen:
              print(f"--- Starte präzise Analyse für: {q['beschreibung']} ---")
              found_events = []

              if "remstal.de" in q['url']:
                  try:
                      with sync_playwright() as p:
                          browser = p.chromium.launch(headless=True)
                          page = browser.new_page()
                          print(f"-> Öffne Kalender im virtuellen Browser...")
                          page.goto(q['url'], wait_until="networkidle", timeout=45000)
                          
                          # Sicherstellen, dass die dynamischen Event-Karten gerendert sind
                          page.wait_for_selector(".article-event, .event, [class*='event']", timeout=10000)
                          
                          soup = BeautifulSoup(page.content(), 'html.parser')
                          browser.close()

                          # Wir suchen gezielt nach den Containern der einzelnen Events
                          # Remstal nutzt typischerweise Klassen wie 'article-event' für ihre Kacheln
                          event_cards = soup.find_all(class_=re.compile(r'article-event|event-item|card-event'))
                          
                          # Fallback, falls die Klassen generischer benannt sind
                          if not event_cards:
                              event_cards = soup.find_all('div', class_=re.compile(r'event'))

                          print(f"   {len(event_cards)} eigenständige Event-Kacheln im Code isoliert.")

                          for card in event_cards:
                              # 1. Titel aus der Überschrift der Kachel extrahieren
                              title_el = card.find(['h3', 'h4', 'span'], class_=re.compile(r'headline|title|name')) or card.find(['h3', 'h4'])
                              # 2. Datum aus dem Kalender-Element der Kachel extrahieren
                              date_el = card.find(class_=re.compile(r'date|time|calendar|day'))
                              # 3. Direkten Link zum Event extrahieren
                              link_el = card.find('a', href=True)

                              if title_el:
                                  title_text = title_el.get_text().strip()
                                  date_text = date_el.get_text().strip() if date_el else "Siehe Webseite"
                                  
                                  # Den Link absolut machen (falls er relativ ist wie /events/...)
                                  event_link = q['url']
                                  if link_el:
                                      href = link_el['href']
                                      if href.startswith('http'):
                                          event_link = href
                                      else:
                                          event_link = "https://www.remstal.de" + href if href.startswith('/') else "https://www.remstal.de/" + href

                                  # Nur echte Feste, Hocketser, Ausschänke, Weindörfer und Märkte filtern
                                  if any(k in title_text.lower() for k in ["fest", "hocketse", "markt", "hock", "ausschank", "vinothek", "weindorf", "besen", "sommerfest"]):
                                      if title_text not in [e["title"] for e in found_events] and len(title_text) < 100:
                                          found_events.append({
                                              "title": title_text,
                                              "date": date_text,
                                              "link": event_link
                                          })
                  except Exception as err:
                      print("Fehler beim Auslesen der Remstal-Event-Karten:", err)
              
              # UNIVERSAL-FALL: Für einfache Vereinsseiten (falls du später welche aktivierst)
              else:
                  try:
                      with sync_playwright() as p:
                          browser = p.chromium.launch(headless=True)
                          page = browser.new_page()
                          page.goto(q['url'], wait_until="networkidle", timeout=30000)
                          soup = BeautifulSoup(page.content(), 'html.parser')
                          lines = [l.strip() for l in soup.get_text().split('\n') if l.strip()]
                          date_pattern = re.compile(r'(\d{1,2}\.\d{1,2}\.)')
                          for i, line in enumerate(lines):
                              if date_pattern.search(line):
                                  context = " | ".join(lines[max(0, i-1):min(len(lines), i+2)])
                                  if any(k in context.lower() for k in ["fest", "hocketse", "hock", "feuerwehrfest"]):
                                      if len(context) < 120 and context not in [e["title"] for e in found_events]:
                                          found_events.append({"title": context, "date": line, "link": q['url']})
                          browser.close()
                  except Exception as err:
                      print("Fehler beim Vereins-Scrape:", err)

              # 3. Ergebnisse saubermachen und in Supabase pumpen
              saved_count = 0
              for ev in found_events[:25]:
                  name = ev["title"]
                  # Bereinige Zeilenumbrüche und überschüssige Leerzeichen im Datum
                  datum = " ".join(ev["date"].split())[:30]
                  
                  check = requests.get(f"{URL}/rest/v1/feste?name=eq.{name}", headers=headers)
                  if check.ok and len(check.json()) == 0:
                      requests.post(f"{URL}/rest/v1/feste", headers=headers, json={
                          "name": name,
                          "veranstalter": q['beschreibung'],
                          "datum": datum,
                          "entfernung": "Region",
                          "link": ev["link"] # Jetzt wird der exakte Detail-Link mitgespeichert!
                      })
                      saved_count += 1
              
              print(f"-> {len(found_events)} echte Feste gefiltert. {saved_count} davon erfolgreich in Supabase eingetragen.")
          EOF
