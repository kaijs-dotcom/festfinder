name: Profi Fest-Scraper (API-Extraktor)

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
      - name: Setup & Scrape
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Installieren
        run: |
          pip install requests playwright
          playwright install chromium

      - name: API-Daten abgreifen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import requests
          from playwright.sync_api import sync_playwright

          URL = os.environ.get("SUPABASE_URL")
          KEY = os.environ.get("SUPABASE_KEY")
          headers = {"apikey": KEY, "Authorization": f"Bearer {KEY}", "Content-Type": "application/json"}

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              
              # Wir sammeln alle Events in einer Liste
              events_found = []

              def handle_response(response):
                  if "events" in response.url and "json" in response.headers.get("content-type", ""):
                      try:
                          data = response.json()
                          # Oft ist das JSON eine Liste oder enthält ein "items" Feld
                          items = data if isinstance(data, list) else data.get("items", [])
                          for item in items:
                              name = item.get("title", item.get("name", "Unbekannt"))
                              datum = item.get("date", item.get("start_date", "TBA"))
                              link = "https://remstal.de" + item.get("url", "")
                              
                              # In DB speichern
                              requests.post(f"{URL}/rest/v1/feste", headers=headers, json={
                                  "name": name,
                                  "veranstalter": "Remstal Tourismus",
                                  "datum": datum,
                                  "link": link
                              })
                      except: pass
              
              page.on("response", handle_response)
              page.goto("https://remstal.de/events/kalender", wait_until="networkidle")
              page.get_by_text("Liste").first.click()
              page.wait_for_timeout(5000)
              browser.close()
          EOF
