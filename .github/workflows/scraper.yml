name: Event-Struktur-Analyse

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Debug HTML Struktur
        run: |
          pip install beautifulsoup4 requests lxml
          python - << 'EOF'
          import requests
          from bs4 import BeautifulSoup
          
          target_url = "https://www.schwarzwald-tourismus.info/schwarzwald/dorfurlaub/herrischried-und-rickenbach/veranstaltungen"
          response = requests.get(target_url, headers={"User-Agent": "FestFinder-Bot/2.0"})
          soup = BeautifulSoup(response.content, 'lxml')
          
          # Wir suchen jetzt mal nach allen DIVs, um zu sehen, wie die Event-Boxen heißen
          # Wir schauen uns das erste Div an, das nach einer Event-Box aussieht
          found_divs = soup.find_all('div')
          for div in found_divs:
              classes = div.get('class', [])
              # Wir suchen nach typischen Event-Klassen
              if any(c in str(classes) for c in ['teaser', 'event', 'item', 'card']):
                  print(f"Gefundene Event-Box-Klasse: {classes}")
                  print("Inhalt der Box:")
                  print(div.get_text(strip=True)[:500])
                  break 
          EOF
