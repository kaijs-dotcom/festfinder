name: Profi Fest-Scraper (API-Erzwinger)

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
      - name: Setup & Scrape
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Installieren
        run: |
          pip install requests playwright
          playwright install chromium

      - name: API-Daten abgreifen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import requests
          from playwright.sync_api import sync_playwright

          URL = os.environ.get("SUPABASE_URL")
          KEY = os.environ.get("SUPABASE_KEY")
          headers = {"apikey": KEY, "Authorization": f"Bearer {KEY}", "Content-Type": "application/json"}

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              
              # Wir loggen die Requests, um die URL zu finden
              def get_requests(route, request):
                  if "events" in request.url:
                      print(f"GEFUNDENE API-URL: {request.url}")
                  route.continue_()
              
              page.route("**/*", get_requests)
              page.goto("https://remstal.de/events/kalender", wait_until="networkidle")
              page.wait_for_timeout(10000)
              browser.close()
          EOF
