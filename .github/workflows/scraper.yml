name: Deep-Crawler-Debugger

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: HTML-Inhalt analysieren
        run: |
          pip install beautifulsoup4 requests lxml
          python - << 'EOF'
          import requests
          from bs4 import BeautifulSoup
          
          target_url = "https://www.schwarzwald-tourismus.info/schwarzwald/dorfurlaub/herrischried-und-rickenbach/veranstaltungen"
          response = requests.get(target_url, headers={"User-Agent": "FestFinder-Bot/2.0"})
          
          # Wir lassen uns den Anfang des HTMLs und alle Überschriften zeigen
          soup = BeautifulSoup(response.content, 'lxml')
          
          print("--- Erste 1000 Zeichen der Seite ---")
          print(response.text[:1000])
          
          print("\n--- Alle h2/h3 Überschriften auf der Seite ---")
          for h in soup.find_all(['h2', 'h3']):
              print(f"Überschrift: {h.get_text(strip=True)}")
          EOF
