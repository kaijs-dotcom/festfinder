name: Event-Pipeline-Final-Fix

on:
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Pipeline ausführen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          pip install beautifulsoup4 requests lxml
          python - << 'EOF'
          import requests, os
          from bs4 import BeautifulSoup
          
          URL, KEY = os.environ.get("SUPABASE_URL"), os.environ.get("SUPABASE_KEY")
          # WICHTIG: Das "Prefer" Header ist für Supabase wichtig
          headers = {"apikey": KEY, "Authorization": f"Bearer {KEY}", "Content-Type": "application/json", "Prefer": "return=representation"}
          
          base_url = "https://www.schwarzwald-tourismus.info"
          target_url = f"{base_url}/schwarzwald/dorfurlaub/herrischried-und-rickenbach/veranstaltungen"
          
          # 1. SAUBERES LÖSCHEN (mit ID-Filter, sonst passiert bei Supabase nichts)
          requests.delete(f"{URL}/rest/v1/feste?id=gte.0", headers=headers)
          requests.delete(f"{URL}/rest/v1/suchworte?id=gte.0", headers=headers)
          
          # 2. SEITE LADEN
          response = requests.get(target_url, headers={"User-Agent": "FestFinder-Bot/2.0"})
          soup = BeautifulSoup(response.content, 'lxml')
          
          # 3. GEZIELTE EXTRAKTION
          # Wir suchen nur noch nach den Links, die wirklich Event-Titel enthalten
          # Die Webseite nutzt oft 'h3' für Titel innerhalb der Event-Boxen
          events = soup.find_all('div', class_='c-headline__icon-wrapper')
          
          for e in events:
              # Wir suchen gezielt nur nach dem Text im h3 oder dem ersten starken Element
              title_element = e.find(['h3', 'h4', 'strong'])
              if title_element:
                  name = title_element.get_text(strip=True)
                  full_link = base_url + e.find('a')['href'] if e.find('a') else ""
                  
                  # Wir filtern Duplikate und "leere" Titel aus
                  if len(name) > 5:
                      print(f"Importiere: {name}")
                      
                      # Event speichern
                      requests.post(f"{URL}/rest/v1/feste", headers=headers, json={
                          "name": name, 
                          "veranstalter": "Schwarzwald Tourismus",
                          "link": full_link
                      })
                      
                      # Suchworte
                      for kw in ['Fest', 'Markt', 'Tour', 'Wanderung', 'Konzert']:
                          if kw.lower() in name.lower():
                              requests.post(f"{URL}/rest/v1/suchworte", headers=headers, json={"wort": kw})
          EOF
