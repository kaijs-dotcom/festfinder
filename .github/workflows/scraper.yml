name: Event-DEBUG-Pipeline

on:
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Pipeline ausführen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          pip install beautifulsoup4 requests lxml
          python - << 'EOF'
          import requests, os
          from bs4 import BeautifulSoup
          
          URL, KEY = os.environ.get("SUPABASE_URL"), os.environ.get("SUPABASE_KEY")
          headers = {"apikey": KEY, "Authorization": f"Bearer {KEY}", "Content-Type": "application/json", "Prefer": "return=representation"}
          
          # 1. Verbindung testen
          target_url = "https://www.schwarzwald-tourismus.info/schwarzwald/dorfurlaub/herrischried-und-rickenbach/veranstaltungen"
          response = requests.get(target_url, headers={"User-Agent": "FestFinder-Bot/2.0"})
          print(f"DEBUG: Webseite Status Code: {response.status_code}")
          
          soup = BeautifulSoup(response.content, 'lxml')
          
          # 2. Suche nach Boxen - wir probieren es breiter
          # Wir suchen nach allen DIVs, die 'c-headline' im Klassennamen haben
          events = soup.find_all('div', class_=lambda x: x and 'c-headline' in x)
          print(f"DEBUG: Gefundene Event-Boxen: {len(events)}")
          
          if len(events) == 0:
              print("FEHLER: Keine Elemente gefunden! Prüfe die Struktur.")
              exit(1)
          
          # 3. Wenn was gefunden wurde, löschen wir erst jetzt (Sicherheit!)
          requests.delete(f"{URL}/rest/v1/feste?id=gte.0", headers=headers)
          
          # 4. Import-Logik
          for e in events:
              name = e.get_text(strip=True)
              if len(name) > 5:
                  print(f"Importiere: {name}")
                  requests.post(f"{URL}/rest/v1/feste", headers=headers, json={"name": name, "veranstalter": "Schwarzwald Tourismus"})
          EOF
