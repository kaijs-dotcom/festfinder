name: Profi Fest-Scraper (API & Playwright)

on:
  schedule:
    # Läuft jede Nacht um 3:00 Uhr UTC (ca. 4:00/5:00 Uhr deutscher Zeit)
    - cron: '0 3 * * *'
  workflow_dispatch: # Ermöglicht den manuellen Start über den Actions-Tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Abhängigkeiten installieren
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium

      - name: Quellen intelligent auslesen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import requests
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright
          import re
          from datetime import datetime

          URL = os.environ.get("SUPABASE_URL")
          KEY = os.environ.get("SUPABASE_KEY")
          headers = {
              "apikey": KEY,
              "Authorization": f"Bearer {KEY}",
              "Content-Type": "application/json",
              "Prefer": "return=minimal"
          }

          # Dynamisches Tagesdatum im deutschen Format erzeugen (z.B. 22.06.2026)
          heute_str = datetime.now().strftime("%d.%m.%Y")

          # 1. Aktive Quellen aus Supabase laden
          try:
              res = requests.get(f"{URL}/rest/v1/quellen?aktiv_status=eq.true", headers=headers)
              quellen = res.json()
          except Exception as e:
              print("Fehler beim Laden der Quellen:", e)
              quellen = []

          # 2. Schleife durch alle deine URLs
          for q in quellen:
              print(f"Scrape Quelle: {q['beschreibung']}")
              found_events = []

              # SPEZIALFALL: Remstal-Kalender über direkte API-Schnittstelle knacken
              if "remstal.de" in q['url']:
                  try:
                      print(f"-> Nutze dynamischen API-Zugriff für Remstal (Startdatum: {heute_str})...")
                      api_url = "https://www.remstal.de/index.php?id=2270&type=1567584102&tx_itcevents_calendar%5Baction%5D=ajaxList&tx_itcevents_calendar%5Bcontroller%5D=Event"
                      form_data = {
                          'tx_itcevents_calendar[search][mainCategory]': '',
                          'tx_itcevents_calendar[search][dateStart]': heute_str
                      }
                      api_res = requests.post(api_url, data=form_data, timeout=15)
                      
                      if api_res.ok:
                          soup = BeautifulSoup(api_res.text, 'html.parser')
                          # Suche nach Event-Containern im gelieferten HTML-Fragment
                          items = soup.find_all('div', class_=re.compile(r'event|article'))
                          
                          for item in items:
                              title_el = item.find(['h3', 'h4', 'span'], class_=re.compile(r'headline|title')) or item.find('h3')
                              date_el = item.find(class_=re.compile(r'date|time|calendar'))
                              
                              if title_el:
                                  title_text = title_el.get_text().strip()
                                  date_text = date_el.get_text().strip() if date_el else "Demnächst"
                                  
                                  # Breitere Schlagwortsuche für reale Treffer
                                  if any(k in title_text.lower() for k in ["fest", "hocketse", "markt", "hock", "festival", "wein", "sommer", "live", "treff"]):
                                      if len(title_text) > 5 and title_text not in [e["title"] for e in found_events]:
                                          found_events.append({
                                              "title": title_text,
                                              "date": date_text
                                          })
                  except Exception as api_err:
                      print("API-Schnittstelle fehlgeschlagen, wechsle zu Browser...", api_err)

              # UNIVERSALFALL: Playwright-Browser für klassische Websites / Vereine
              if not found_events:
                  try:
                      with sync_playwright() as p:
                          browser = p.chromium.launch(headless=True)
                          page = browser.new_page()
                          page.goto(q['url'], wait_until="networkidle", timeout=30000)
                          soup = BeautifulSoup(page.content(), 'html.parser')
                          
                          lines = [l.strip() for l in soup.get_text().split('\n') if l.strip()]
                          date_pattern = re.compile(r'(\d{1,2}\.\d{1,2}\.)')
                          
                          for i, line in enumerate(lines):
                              if date_pattern.search(line):
                                  context = " | ".join(lines[max(0, i-1):min(len(lines), i+2)])
                                  if any(k in context.lower() for k in ["fest", "hocketse", "termine", "hock", "feier", "sportfest"]):
                                      if len(context) < 150:
                                          found_events.append({
                                              "title": context,
                                              "date": line
                                          })
                          browser.close()
                  except Exception as browser_err:
                      print("Browser-Scrape fehlgeschlagen:", browser_err)

              # 3. Ergebnisse in Supabase abspeichern
              saved_count = 0
              for ev in found_events[:15]: # Die besten 15 Funde eintragen
                  name = ev["title"][:80]
                  # Bereinige Zeilenumbrüche im Datum
                  datum = ev["date"].replace("\n", " ").strip()[:30]
                  
                  # Duplikat-Check: Existiert dieses Fest schon?
                  check = requests.get(f"{URL}/rest/v1/feste?name=eq.{name}", headers=headers)
                  if check.ok and len(check.json()) == 0:
                      requests.post(f"{URL}/rest/v1/feste", headers=headers, json={
                          "name": name,
                          "veranstalter": q['beschreibung'],
                          "datum": datum,
                          "entfernung": "Region",
                          "link": q['url']
                      })
                      saved_count += 1
              
              print(f"-> Erfolgreich {saved_count} echte Feste in Supabase gespeichert.")
          EOF
