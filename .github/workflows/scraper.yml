name: Event-Komplett-Pipeline

on:
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Pipeline ausführen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          pip install beautifulsoup4 requests lxml
          python - << 'EOF'
          import requests, os
          from bs4 import BeautifulSoup
          
          URL, KEY = os.environ.get("SUPABASE_URL"), os.environ.get("SUPABASE_KEY")
          headers = {"apikey": KEY, "Authorization": f"Bearer {KEY}", "Content-Type": "application/json", "Prefer": "return=representation"}
          
          base_url = "https://www.schwarzwald-tourismus.info"
          target_url = f"{base_url}/schwarzwald/dorfurlaub/herrischried-und-rickenbach/veranstaltungen"
          
          # 1. Tabellen leeren für einen sauberen Test
          requests.delete(f"{URL}/rest/v1/feste", headers=headers)
          requests.delete(f"{URL}/rest/v1/suchworte", headers=headers)
          
          # 2. Quelle registrieren (Upsert-Logik)
          requests.post(f"{URL}/rest/v1/quellen", headers=headers, json={"name": "Schwarzwald-Tourismus", "url": target_url})
          
          # 3. Events laden
          response = requests.get(target_url, headers={"User-Agent": "FestFinder-Bot/2.0"})
          soup = BeautifulSoup(response.content, 'lxml')
          events = soup.find_all('div', class_='c-headline__icon-wrapper')
          
          print(f"Importiere {len(events)} Events...")
          
          for e in events:
              name = e.get_text(strip=True)
              if len(name) > 5:
                  # Event speichern
                  requests.post(f"{URL}/rest/v1/feste", headers=headers, json={"name": name, "veranstalter": "Schwarzwald Tourismus"})
                  
                  # Keyword-Analyse
                  keywords = ['Fest', 'Markt', 'Tour', 'Wanderung', 'Konzert']
                  for kw in keywords:
                      if kw.lower() in name.lower():
                          requests.post(f"{URL}/rest/v1/suchworte", headers=headers, json={"wort": kw})
          EOF
