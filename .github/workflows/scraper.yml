name: Profi Fest-Scraper (Fix & API)

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
      - name: Setup & Scrape
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Installieren
        run: |
          pip install requests playwright
          playwright install chromium

      - name: API-Daten abgreifen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import requests
          from playwright.sync_api import sync_playwright

          URL = os.environ.get("SUPABASE_URL")
          KEY = os.environ.get("SUPABASE_KEY")
          headers = {"apikey": KEY, "Authorization": f"Bearer {KEY}", "Content-Type": "application/json"}

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.goto("https://remstal.de/events/kalender", wait_until="networkidle")
              
              # 1. Cookie-Banner mit roher Gewalt schließen
              page.wait_for_timeout(3000)
              try:
                  page.evaluate("document.querySelector('#usercentrics-root')?.shadowRoot?.querySelector('button[data-testid=\"uc-accept-all-button\"]')?.click()")
                  page.wait_for_timeout(2000)
              except: pass

              # 2. Liste klicken - diesmal mit JS-Klick, falls das Element "unter" dem Banner liegt
              try:
                  page.evaluate("document.evaluate(\"//span[text()='Liste']\", document, null, XPathResult.FIRST_ORDERED_NODE_TYPE, null).singleNodeValue.click()")
                  page.wait_for_timeout(5000)
              except Exception as e:
                  print(f"Klick-Fehler ignoriert: {e}")

              # 3. Daten abgreifen
              def handle_response(response):
                  if "events" in response.url and "json" in response.headers.get("content-type", ""):
                      try:
                          data = response.json()
                          items = data if isinstance(data, list) else data.get("items", [])
                          for item in items:
                              name = item.get("title", "Event")
                              datum = item.get("start_date", "Datum unbekannt")
                              link = "https://remstal.de" + item.get("url", "")
                              requests.post(f"{URL}/rest/v1/feste", headers=headers, json={"name": name, "datum": datum, "link": link})
                      except: pass
              
              page.on("response", handle_response)
              page.wait_for_timeout(5000)
              browser.close()
          EOF
