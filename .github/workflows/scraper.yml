name: Profi Fest-Scraper (API & Playwright)

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Abhängigkeiten installieren
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium

      - name: Quellen intelligent auslesen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import requests
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright
          import re

          URL = os.environ.get("SUPABASE_URL")
          KEY = os.environ.get("SUPABASE_KEY")
          headers = {
              "apikey": KEY,
              "Authorization": f"Bearer {KEY}",
              "Content-Type": "application/json",
              "Prefer": "return=minimal"
          }

          # 1. Quellen laden
          try:
              res = requests.get(f"{URL}/rest/v1/quellen?aktiv_status=eq.true", headers=headers)
              quellen = res.json()
          except Exception as e:
              print("Fehler beim Laden:", e)
              quellen = []

          for q in quellen:
              print(f"Scrape Quelle: {q['beschreibung']}")
              found_events = []

              # SPEZIALFALL: Remstal-Kalender über direkte API-Schnittstelle knacken
              if "remstal.de" in q['url']:
                  try:
                      print("-> Nutze direkten API-Zugriff für Remstal...")
                      # Wir steuern direkt die JSON-Schnittstelle von Remstal an
                      api_url = "https://www.remstal.de/index.php?id=2270&type=1567584102&tx_itcevents_calendar%5Baction%5D=ajaxList&tx_itcevents_calendar%5Bcontroller%5D=Event"
                      # Wir simulieren den Filter für kommende Events
                      form_data = {
                          'tx_itcevents_calendar[search][mainCategory]': '',
                          'tx_itcevents_calendar[search][dateStart]': '22.06.2026'
                      }
                      api_res = requests.post(api_url, data=form_data, timeout=15)
                      
                      # Wenn wir strukturierte Daten bekommen, extrahieren wir die echten Feste
                      if api_res.ok:
                          soup = BeautifulSoup(api_res.text, 'html.parser')
                          # Suche nach den Event-Einträgen im gelieferten HTML-Fragment
                          items = soup.find_all(class_="article-event") or soup.find_all('div', class_=re.compile(r'event'))
                          
                          for item in items:
                              title_el = item.find(class_="headline") or item.find('h3') or item.find('h4')
                              date_el = item.find(class_="date") or item.find(class_="time")
                              
                              if title_el:
                                  title_text = title_el.get_text().strip()
                                  date_text = date_el.get_text().strip() if date_el else "Demnächst"
                                  
                                  # Filter nach Festen/Hocketsern
                                  if any(k in title_text.lower() for k in ["fest", "hocketse", "markt", "hock", "festival", "weindorf"]):
                                      found_events.append({
                                          "title": title_text,
                                          "date": date_text
                                      })
                  except Exception as api_err:
                      print("API-Schnittstelle fehlgeschlagen, wechsle zu Browser...", api_err)

              # UNIVERSALFALL: Playwright-Browser für klassische Webseiten/Vereine
              if not found_events:
                  try:
                      with sync_playwright() as p:
                          browser = p.chromium.launch(headless=True)
                          page = browser.new_page()
                          page.goto(q['url'], wait_until="networkidle", timeout=30000)
                          
                          # Eventuelle Cookie-Banner wegdrehen, indem wir nur den echten Content-Bereich auslesen
                          html = page.content()
                          soup = BeautifulSoup(html, 'html.parser')
                          
                          # Suche nach Datumszeilen im Text
                          lines = [l.strip() for l in soup.get_text().split('\n') if l.strip()]
                          date_pattern = re.compile(r'(\d{1,2}\.\d{1,2}\.)')
                          
                          for i, line in enumerate(lines):
                              if date_pattern.search(line):
                                  context = " | ".join(lines[max(0, i-1):min(len(lines), i+2)])
                                  if any(k in context.lower() for k in ["fest", "hocketse", "hauptversammlung", "termine", "hock"]):
                                      if len(context) < 150:
                                          found_events.append({
                                              "title": context,
                                              "date": line
                                          })
                          browser.close()
                  except Exception as browser_err:
                      print("Browser-Scrape fehlgeschlagen:", browser_err)

              # 3. Ergebnisse speichern
              saved_count = 0
              for ev in found_events[:15]:  # Die besten 15 Funde eintragen
                  name = ev.get("title", "Fest")[:80]
                  datum = ev.get("date", "Siehe Website")[:30]
                  
                  # Duplikat-Check
                  check = requests.get(f"{URL}/rest/v1/feste?name=eq.{name}", headers=headers)
                  if check.ok and len(check.json()) == 0:
                      requests.post(f"{URL}/rest/v1/feste", headers=headers, json={
                          "name": name,
                          "veranstalter": q['beschreibung'],
                          "datum": datum,
                          "entfernung": "Remstal / Region",
                          "link": q['url']
                      })
                      saved_count += 1
              
              print(f"-> Erfolgreich {saved_count} echte Feste gespeichert.")
          EOF
