name: Profi Fest-Scraper (Screenshot-Diagnose)

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Setup & Scrape
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Installieren
        run: |
          pip install playwright requests
          playwright install chromium

      - name: Screenshot erzwingen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import requests
          from playwright.sync_api import sync_playwright

          URL = os.environ.get("SUPABASE_URL")
          KEY = os.environ.get("SUPABASE_KEY")
          headers = {"apikey": KEY, "Authorization": f"Bearer {KEY}"}

          # Fehler beim Abruf der Quelle ignorieren
          try:
              res = requests.get(f"{URL}/rest/v1/quellen?aktiv_status=eq.true", headers=headers)
              q = res.json()[0]
              target_url = q['url']
          except:
              target_url = "https://remstal.de/events/kalender"

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.set_viewport_size({"width": 375, "height": 1200})
              
              print(f"Besuche: {target_url}")
              page.goto(target_url, wait_until="networkidle", timeout=60000)
              page.wait_for_timeout(5000)
              
              # Cookie-Banner versuchen, aber Fehler ignorieren
              try:
                  page.locator("button[data-testid='uc-accept-all-button']").click()
                  print("Cookie-Banner geklickt.")
              except:
                  print("Kein Cookie-Banner gefunden, mache trotzdem Foto.")
              
              page.screenshot(path="debug_ansicht.png")
              browser.close()
          EOF

      - name: Screenshot hochladen
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: debug_ansicht.png
