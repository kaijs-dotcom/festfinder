name: Event-Präzisions-Import

on:
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Pipeline ausführen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          pip install beautifulsoup4 requests lxml
          python - << 'EOF'
          import requests, os
          from bs4 import BeautifulSoup
          
          URL, KEY = os.environ.get("SUPABASE_URL"), os.environ.get("SUPABASE_KEY")
          headers = {"apikey": KEY, "Authorization": f"Bearer {KEY}", "Content-Type": "application/json", "Prefer": "return=representation"}
          
          target_url = "https://www.schwarzwald-tourismus.info/schwarzwald/dorfurlaub/herrischried-und-rickenbach/veranstaltungen"
          response = requests.get(target_url, headers={"User-Agent": "FestFinder-Bot/2.0"})
          soup = BeautifulSoup(response.content, 'lxml')
          
          # V4-Selektor, der nachweislich die Event-Boxen findet
          events = soup.find_all('div', class_='c-headline__icon-wrapper')
          
          # Liste für die neuen Daten vorbereiten
          new_events = []
          
          for e in events:
              # Wir suchen GESTEUERT nur nach der H3-Überschrift (dort steht der Titel sauber)
              title_tag = e.find('h3')
              if title_tag:
                  name = title_tag.get_text(strip=True)
                  # Filter: Wir wollen keine Menü-Überschriften
                  if "Tipps" in name or "Navigation" in name:
                      continue
                  new_events.append({"name": name, "veranstalter": "Schwarzwald Tourismus"})
          
          # Erst wenn wir Daten gefunden haben, löschen wir alt und schreiben neu
          if len(new_events) > 0:
              print(f"DEBUG: Gefundene saubere Events: {len(new_events)}")
              
              # Jetzt sicher löschen
              requests.delete(f"{URL}/rest/v1/feste?id=gte.0", headers=headers)
              
              # Jetzt hochladen
              for ev in new_events:
                  print(f"Importiere: {ev['name']}")
                  requests.post(f"{URL}/rest/v1/feste", headers=headers, json=ev)
          else:
              print("FEHLER: Keine Events gefunden. Abbruch zur Sicherheit.")
              exit(1)
          EOF
