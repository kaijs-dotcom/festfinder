import os
import requests
import re
from bs4 import BeautifulSoup

def run_crawler():
    # 1. Konfiguration aus GitHub Secrets laden
    supabase_url = os.environ.get("SUPABASE_URL")
    supabase_key = os.environ.get("SUPABASE_KEY")
    target_url = "https://www.schwarzwald-tourismus.info/schwarzwald/dorfurlaub/herrischried-und-rickenbach/veranstaltungen"

    if not supabase_url or not supabase_key:
        print("Fehler: Umgebungsvariablen SUPABASE_URL oder SUPABASE_KEY fehlen.")
        return

    # 2. Header für den Upsert-Modus (Dank Unique Constraint in Supabase)
    headers = {
        "apikey": supabase_key,
        "Authorization": f"Bearer {supabase_key}",
        "Content-Type": "application/json",
        "Prefer": "resolution=merge-duplicates" 
    }

    # 3. Webseite laden
    print(f"Starte Crawler für: {target_url}")
    response = requests.get(target_url, headers={"User-Agent": "FestFinder-Bot/2.0"})
    
    if response.status_code != 200:
        print(f"Fehler beim Laden der Seite: {response.status_code}")
        return

    soup = BeautifulSoup(response.content, 'lxml')
    
    # 4. Elemente finden (basierend auf der bewährten Klasse)
    events = soup.find_all('div', class_='c-headline__icon-wrapper')
    print(f"Gefundene Elemente: {len(events)}")

    for e in events:
        # Extraktion
        h3_tag = e.find('h3')
        if not h3_tag:
            continue
            
        raw_name = h3_tag.get_text(strip=True)
        
        # --- DATEN-PUTZ-FILTER ---
        # Entfernt Duplikate wie "FührungFührung"
        clean_name = re.sub(r'(.+?)\1', r'\1', raw_name)
        
        # Filter: Überspringe Menü-Elemente, die keine Events sind
        if any(word in clean_name for word in ["Navigation", "Service", "Tipps"]):
            continue
        # -------------------------

        # 5. Daten an Supabase senden
        payload = {
            "name": clean_name,
            "veranstalter": "Schwarzwald Tourismus"
        }

        resp = requests.post(f"{supabase_url}/rest/v1/feste", headers=headers, json=payload)

        if resp.status_code in [200, 201]:
            print(f"Erfolgreich gespeichert: {clean_name}")
        else:
            print(f"Fehler bei {clean_name}: {resp.status_code} - {resp.text}")

if __name__ == "__main__":
    run_crawler()
