name: Profi Fest-Scraper (Event-Scharfschütze)

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
      - name: Setup & Scrape
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Installieren
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium

      - name: Event-Scharfschütze ausführen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import requests
          from playwright.sync_api import sync_playwright
          from bs4 import BeautifulSoup

          URL = os.environ.get("SUPABASE_URL")
          KEY = os.environ.get("SUPABASE_KEY")
          headers = {"apikey": KEY, "Authorization": f"Bearer {KEY}", "Content-Type": "application/json", "Prefer": "return=minimal"}

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.goto("https://remstal.de/events/kalender", wait_until="networkidle", timeout=60000)
              page.wait_for_timeout(5000) # Warten, bis der Kalender lädt
              
              # Suche nach Elementen, die 'event' oder 'date' im Namen haben
              soup = BeautifulSoup(page.content(), 'html.parser')
              elements = soup.select("[class*='event'], [class*='calendar-item'], .teaser")
              
              print(f"Gefundene Kandidaten: {len(elements)}")
              
              for el in elements:
                  text = el.get_text(" ", strip=True)
                  # Wir filtern nach 'Datum'-ähnlichen Strukturen (z.B. 22.06. oder ähnliches)
                  if len(text) > 20 and any(char.isdigit() for char in text):
                      requests.post(f"{URL}/rest/v1/feste", headers=headers, json={
                          "name": text[:50],
                          "veranstalter": "Remstal Tourismus",
                          "datum": "Gefunden",
                          "link": "https://remstal.de/events/kalender"
                      })
              browser.close()
          EOF
