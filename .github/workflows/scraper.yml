name: Nürtingen-Event-Scraper

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Scrape Nürtingen
        run: |
          pip install requests beautifulsoup4
          python - << 'EOF'
          import requests
          from bs4 import BeautifulSoup

          target = "https://www.nuertingen.de/stadt-nuertingen/rathaus/aktuelles/veranstaltungskalender/seite-1/suche-none"
          response = requests.get(target, headers={"User-Agent": "Mozilla/5.0"})
          
          soup = BeautifulSoup(response.content, 'html.parser')
          
          # Wir suchen erst mal allgemein, um die Struktur zu verstehen
          print("Suche nach Events in der Nürtingen-Struktur...")
          
          # Oft nutzen städtische Seiten Container wie 'div' mit 'event' im Klassennamen
          events = soup.find_all(lambda tag: tag.name == 'div' and tag.get('class') and any('event' in c for c in tag.get('class')))
          
          print(f"DEBUG: Anzahl gefundener Container mit 'event' im Namen: {len(events)}")
          
          for i, e in enumerate(events[:5]): # Zeige uns nur die ersten 5 zum Testen
              print(f"--- Event {i+1} ---")
              print(e.get_text(strip=True, separator=' '))
          EOF
