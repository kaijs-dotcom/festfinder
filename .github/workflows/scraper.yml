name: Profi Fest-Scraper (Remstal & Hocketse Focus)

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Abhängigkeiten installieren
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium

      - name: Quellen intelligent auslesen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import requests
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright
          import re

          URL = os.environ.get("SUPABASE_URL")
          KEY = os.environ.get("SUPABASE_KEY")
          headers = {
              "apikey": KEY,
              "Authorization": f"Bearer {KEY}",
              "Content-Type": "application/json",
              "Prefer": "return=minimal"
          }

          try:
              res = requests.get(f"{URL}/rest/v1/quellen?aktiv_status=eq.true", headers=headers)
              quellen = res.json()
          except Exception as e:
              print("Fehler beim Laden der Quellen:", e)
              quellen = []

          for q in quellen:
              print(f"--- Starte Analyse für: {q['beschreibung']} ---")
              found_events = []

              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(headless=True)
                      page = browser.new_page()
                      
                      # Seite laden und etwas Zeit geben, damit Scripte feuern können
                      print(f"-> Öffne Webseite: {q['url']}")
                      page.goto(q['url'], wait_until="domcontentloaded", timeout=30000)
                      page.wait_for_timeout(3000) # Kurze Verschnaufpause zum Nachladen
                      
                      soup = BeautifulSoup(page.content(), 'html.parser')
                      browser.close()
                      
                      # Wir suchen gezielt nach allen verlinkten Überschriften und Event-Karten
                      cards = soup.find_all(['h3', 'h4', 'div', 'a'])
                      print(f"   Analysiere {len(cards)} Elemente auf der Seite...")
                      
                      for card in cards:
                          text = card.get_text().strip()
                          
                          # Relevante Keywords für Feste, Wein, Hocketser & Ausschank
                          keywords = ["fest", "hocketse", "hock", "feuerwehr", "ausschank", "vinothek", "weindorf", "besen", "sommerfest", "markt"]
                          
                          if any(k in text.lower() for k in keywords):
                              # Säubern: Nur Zeilen nehmen, die kurz genug für einen Titel sind
                              lines = [l.strip() for l in text.split('\n') if l.strip()]
                              if lines:
                                  title = lines[0]
                                  # Verhindern, dass wir Menüpunkte oder Müll greifen
                                  if 10 < len(title) < 90 and not any(x in title.lower() for x in ["suchen", "filter", "kontakt", "impressum"]):
                                      if title not in [e["title"] for e in found_events]:
                                          found_events.append({
                                              "title": title,
                                              "date": "Siehe Webseite"
                                          })

              except Exception as err:
                  print("Fehler beim Auslesen der Seite:", err)

              # Speichern der Treffer in Supabase
              saved_count = 0
              for ev in found_events[:20]: # Bis zu 20 Events aufnehmen
                  name = ev["title"]
                  datum = ev["date"]
                  
                  check = requests.get(f"{URL}/rest/v1/feste?name=eq.{name}", headers=headers)
                  if check.ok and len(check.json()) == 0:
                      requests.post(f"{URL}/rest/v1/feste", headers=headers, json={
                          "name": name,
                          "veranstalter": q['beschreibung'],
                          "datum": datum,
                          "entfernung": "Region",
                          "link": q['url']
                      })
                      saved_count += 1
              
              print(f"-> {len(found_events)} Feste/Ausschänke erkannt. {saved_count} davon neu gespeichert.")
          EOF
